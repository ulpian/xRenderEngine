# cargo-deny configuration (RiftEngine-Plan/05-phase-0-foundations.md §0.1).
# Run with: cargo deny check

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# Permissive licenses compatible with xRenderEngine's "MIT OR Apache-2.0" terms.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
